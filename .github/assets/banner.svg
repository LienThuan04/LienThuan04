    href="https://raw.githubusercontent.com/LienThuan04/LienThuan04/main/.github/assets/Yeshuanguang.gif"
    x="0" y="0" width="800" height="250"
    preserveAspectRatio="xMidYMid slice" />

  <!-- Overlay -->
  <rect x="0" y="0" width="800" height="250" fill="rgba(0,0,0,0.55)" />

  <!-- Top line -->
